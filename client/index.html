<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wheel of Steam</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Layer A: collection of all game covers -->
  <div id="bg-grid-a"></div>

  <!-- Layer B: winner game images (fades in over A) -->
  <div id="bg-grid-b"></div>

  <!-- Dark overlay -->
  <div id="bg-overlay"></div>

  <div class="container">
    <header>
      <h1>Wheel of Steam</h1>
      <p class="subtitle">Spin to decide what to play next</p>
    </header>

    <div class="controls">
      <input id="profile" placeholder="Paste your Steam profile URL" />
      <div class="btn-row">
        <button onclick="load()" id="loadBtn">Load Games</button>
        <button onclick="spin()" id="spinBtn">Spin</button>
      </div>
    </div>

    <div class="wheel-wrap">
      <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
      </div>
    </div>

    <div class="current">
      <span class="label">Now Landing On</span>
      <h2 id="currentGame">—</h2>
    </div>

    <div id="result"></div>

    <footer>
      <p>We wheely want to hear from you:</p>
      <a href="mailto:info@wheelofsteam.com">info@wheelofsteam.com</a>
      <label class="art-toggle">
        <input type="checkbox" id="disableArt" />
        <span>Disable background art</span>
      </label>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
